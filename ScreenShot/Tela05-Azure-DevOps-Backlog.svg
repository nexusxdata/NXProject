    <rect x="24" y="382" width="372" height="28" rx="4" fill="#f6f8fa" stroke="#d0d7de"/>
    <text x="42" y="401" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#57606a">Ordem do backlog preservada por StackRank.</text>
    <rect x="420" y="382" width="360" height="28" rx="4" fill="#f6f8fa" stroke="#d0d7de"/>
    <text x="438" y="401" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#57606a">IterationPath define a sprint no cronograma.</text>
    <rect x="804" y="382" width="388" height="28" rx="4" fill="#f6f8fa" stroke="#d0d7de"/>
    <text x="822" y="401" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#57606a">Datas, horas, status e links voltam na sincronizacao.</text>
  </g>
</svg>
