<svg width="1280" height="720" viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Tela conceitual do Azure DevOps Backlog integrada ao NXProject</title>
  <desc id="desc">Mockup de backlog agil do Azure DevOps com itens importados para o cronograma do NXProject.</desc>
  <rect width="1280" height="720" fill="#f4f6f9"/>

  <rect x="0" y="0" width="1280" height="52" fill="#24292f"/>
  <text x="28" y="33" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" fill="#ffffff">NXProject Community no GitHub</text>
  <text x="1070" y="32" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#c9d1d9">Cronograma + Azure DevOps</text>

  <rect x="32" y="82" width="1216" height="112" rx="6" fill="#ffffff" stroke="#d0d7de"/>
  <text x="58" y="119" font-family="Segoe UI, Arial, sans-serif" font-size="26" font-weight="700" fill="#0969da">Azure DevOps Backlog para projetos ageis</text>
  <text x="58" y="150" font-family="Segoe UI, Arial, sans-serif" font-size="15" fill="#57606a">Visao documental para o GitHub: os work items do DevOps viram cronograma, Gantt, sprints e alocacao de recursos no NXProject.</text>
  <text x="58" y="174" font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#57606a">Exemplo baseado no projeto de pipeline de dados em Databricks publicado nas telas do repositorio.</text>

  <g transform="translate(32 220)">
    <rect width="1216" height="432" rx="6" fill="#ffffff" stroke="#d0d7de"/>
    <rect width="1216" height="50" rx="6" fill="#f6f8fa"/>
    <text x="24" y="31" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" fill="#24292f">Boards / Backlogs / Sprint 1</text>

    <rect x="922" y="12" width="86" height="26" rx="4" fill="#0969da"/>
    <text x="942" y="30" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="700" fill="#ffffff">Importar</text>
    <rect x="1018" y="12" width="104" height="26" rx="4" fill="#2da44e"/>
    <text x="1039" y="30" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="700" fill="#ffffff">Sincronizar</text>
    <rect x="1132" y="12" width="58" height="26" rx="4" fill="#ffffff" stroke="#d0d7de"/>
    <text x="1148" y="30" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#24292f">PAT</text>

    <rect x="24" y="74" width="1168" height="34" fill="#f6f8fa" stroke="#d8dee4"/>
    <text x="42" y="96" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="700" fill="#57606a">ID</text>
    <text x="108" y="96" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="700" fill="#57606a">Tipo</text>
    <text x="214" y="96" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="700" fill="#57606a">Backlog item</text>
    <text x="626" y="96" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="700" fill="#57606a">Estado</text>
    <text x="744" y="96" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="700" fill="#57606a">Sprint</text>
    <text x="860" y="96" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="700" fill="#57606a">HH</text>
    <text x="936" y="96" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="700" fill="#57606a">Responsavel</text>
    <text x="1084" y="96" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="700" fill="#57606a">NXProject</text>

