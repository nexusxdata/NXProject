      <text x="108" y="176">Feature</text>
      <text x="214" y="176">Planejamento e modelagem</text>
      <text x="626" y="176">Active</text>
      <text x="744" y="176">Sprint 1</text>
      <text x="860" y="176">24</text>
      <text x="936" y="176">Arquiteto</text>
      <rect x="1080" y="160" width="84" height="22" rx="11" fill="#dafbe1" stroke="#4ac26b"/>
      <text x="1092" y="176" fill="#1a7f37" font-size="12" font-weight="700">alocado</text>

      <rect x="24" y="192" width="1168" height="42" fill="#ffffff" stroke="#eaeef2"/>
      <text x="42" y="218" fill="#0969da" font-weight="700">1032</text>
      <text x="108" y="218">Story</text>
      <text x="214" y="218">Reuniao de Kick-off e Levantamento de Requisitos</text>
      <text x="626" y="218">Closed</text>
      <text x="744" y="218">Sprint 1</text>
      <text x="860" y="218">8</text>
      <text x="936" y="218">PO</text>
      <rect x="1080" y="202" width="84" height="22" rx="11" fill="#dafbe1" stroke="#4ac26b"/>
      <text x="1094" y="218" fill="#1a7f37" font-size="12" font-weight="700">100%</text>

      <rect x="24" y="234" width="1168" height="42" fill="#fbfcfd" stroke="#eaeef2"/>
      <text x="42" y="260" fill="#0969da" font-weight="700">1033</text>
      <text x="108" y="260">Story</text>
      <text x="214" y="260">Analise Tecnica e Modelagem de Dados</text>
      <text x="626" y="260">Active</text>
      <text x="744" y="260">Sprint 1</text>
      <text x="860" y="260">16</text>
      <text x="936" y="260">Eng. Dados</text>
      <rect x="1080" y="244" width="84" height="22" rx="11" fill="#fff8c5" stroke="#d4a72c"/>
      <text x="1091" y="260" fill="#9a6700" font-size="12" font-weight="700">dep.</text>

      <rect x="24" y="276" width="1168" height="42" fill="#ffffff" stroke="#eaeef2"/>
      <text x="42" y="302" fill="#0969da" font-weight="700">1034</text>
      <text x="108" y="302">Story</text>
      <text x="214" y="302">Configuracao do Ambiente Databricks</text>
      <text x="626" y="302">New</text>
      <text x="744" y="302">Sprint 1</text>
      <text x="860" y="302">16</text>
      <text x="936" y="302">DevOps</text>
      <rect x="1080" y="286" width="84" height="22" rx="11" fill="#f6f8fa" stroke="#d0d7de"/>
      <text x="1090" y="302" fill="#57606a" font-size="12" font-weight="700">pronto</text>

      <rect x="24" y="318" width="1168" height="42" fill="#fbfcfd" stroke="#eaeef2"/>
      <text x="42" y="344" fill="#0969da" font-weight="700">1035</text>
      <text x="108" y="344">Story</text>
      <text x="214" y="344">Setup de Versionamento e CI/CD</text>
      <text x="626" y="344">Blocked</text>
      <text x="744" y="344">Sprint 2</text>
      <text x="860" y="344">8</text>
      <text x="936" y="344">DevOps</text>
      <rect x="1080" y="328" width="84" height="22" rx="11" fill="#ffebe9" stroke="#ff8182"/>
      <text x="1094" y="344" fill="#cf222e" font-size="12" font-weight="700">Block</text>
