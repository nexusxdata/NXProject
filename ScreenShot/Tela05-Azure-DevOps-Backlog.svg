      <text x="108" y="134">Epic</text>
      <text x="214" y="134" font-weight="700">Pipeline de dados Databricks</text>
      <text x="626" y="134">Active</text>
      <text x="744" y="134">Release 1</text>
      <text x="860" y="134">160</text>
      <text x="936" y="134">Equipe Dados</text>
      <rect x="1080" y="118" width="84" height="22" rx="11" fill="#ddf4ff" stroke="#54aeef"/>
